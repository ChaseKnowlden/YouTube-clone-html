<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Clone</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Sidebar -->
    <div id="sidebar" class="sidebar">
        <div class="sidebar-content">
            <div class="sidebar-item">
                <i class="fas fa-home"></i>
                <span>Home</span>
            </div>
            <div class="sidebar-item">
                <i class="fas fa-fire"></i>
                <span>Trending</span>
            </div>
            <div class="sidebar-item">
                <i class="fas fa-folder"></i>
                <span>Subscriptions</span>
            </div>
            <hr>
            <div class="sidebar-item">
                <i class="fas fa-history"></i>
                <span>History</span>
            </div>
            <div class="sidebar-item">
                <i class="fas fa-play-circle"></i>
                <span>Your videos</span>
            </div>
            <div class="sidebar-item">
                <i class="fas fa-clock"></i>
                <span>Watch later</span>
            </div>
            <div class="sidebar-item">
                <i class="fas fa-thumbs-up"></i>
                <span>Liked videos</span>
            </div>
        </div>
    </div>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="navbar-left">
            <button id="hamburger-menu" class="icon-button">
                <i class="fas fa-bars"></i>
            </button>
            <a href="/" class="logo">
                <i class="fab fa-youtube"></i>
                <span class="logo-text">YouTube</span>
            </a>
        </div>

        <div class="navbar-center">
            <div class="search-container">
                <input type="text" class="search-input" placeholder="Search">
                <button class="search-button">
                    <i class="fas fa-search"></i>
                </button>
            </div>
            <button class="icon-button microphone-button">
                <i class="fas fa-microphone"></i>
            </button>
        </div>

        <div class="navbar-right">
            <button class="icon-button create-button">
                <i class="fas fa-video"></i>
            </button>
            <button class="icon-button notifications-button">
                <i class="fas fa-bell"></i>
            </button>
            <button class="sign-in-button">
                <i class="fas fa-user-circle"></i>
                <span>Sign in</span>
            </button>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content">
        <div class="content-area">
            <h1>Welcome to YouTube Clone</h1>
            <p>This is a YouTube clone with a functional navbar.</p>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
